name: CDK CI/CD

on:
    push:
        branches:
        - main
        - develop
    pull_request:

permissions:
    id-token: write
    contents: read

env:
    PYTHON_VERSION: "3.12"
    AWS_REGION: eu-west-2

jobs:
    lint:
        runs-on: ubuntu-latest


        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: ${{ env.PYTHON_VERSION }}

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install ruff
            pip install -r requirements.txt

        - name: Lint
          run: |
            ruff check .


    test:
        runs-on: ubuntu-latest
        needs: lint

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: ${{ env.PYTHON_VERSION }}

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install pytest
                  pip install -r requirements.txt

            - name: Run tests
              run: |
                pytest


    synth:
        runs-on: ubuntu-latest
        needs: test

        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: ${{ env.PYTHON_VERSION }}

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: "20"

        - name: Install CDK CLI
          run: npm install -g aws-cdk

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

        - name: CDK Synth
          run: |
            cdk synth

        - name: Upload Cloud Assembly
          uses: actions/upload-artifact@v4
          with:
            name: cdk.out
            path: cdk.out


    deploy:
     runs-on: ubuntu-latest
     needs: synth
     if: github.ref == 'refs/heads/main'


     steps:
     - name: Checkout
       uses: actions/checkout@v4

     - name: Configure AWS Credentials
       uses: aws-actions/configure-aws-credentials@v4
       with:
        role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

     - name: Setup Python
       uses: actions/setup-python@v5
       with:
        python-version: ${{ env.PYTHON_VERSION }}

     - name: Setup Node.js
       uses: actions/setup-node@v4
       with:
        node-version: "20"

     - name: Install CDK CLI
       run: npm install -g aws-cdk

     - name: Install dependencies
       run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

     - name: Deploy CDK
       run: |
            cdk deploy --all --require-approval never

