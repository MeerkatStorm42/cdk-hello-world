name: python-ci-cd

on:
  push:
    branches:
    - main
    - develop
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run linting
        run: |
          ruff check . --fix


  diff:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          pytest

      - name: setup Node
        uses: actions/setup-node@v4
        with:
            node-version: 20
      - run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::***REMOVED***:role/github-cdk
          aws-region: eu-west-2

      - name: CDK Diff
        run: cdk diff

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, diff]

    steps:
      - name: CDK Deploy
        uses: ./.github/workflows/deploy.yml
